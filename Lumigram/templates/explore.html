<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumigram · Explore</title>
<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gradient: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    --white: #fff;
    --bg: #fafafa;
    --border: #dbdbdb;
    --text: #262626;
    --muted: #8e8e8e;
    --blue: #0095f6;
    --red: #ed4956;
    --green: #26d679;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }

  /* ── NAVBAR ── */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:var(--white); border-bottom:1px solid var(--border);
    height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 20px;
  }
  .nav-logo { font-family:'Grand Hotel',cursive; font-size:26px; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; cursor:pointer; }
  .nav-icons { display:flex; align-items:center; gap:18px; }
  .nav-icons svg { cursor:pointer; width:24px; height:24px; }
  .nav-icons svg:hover { opacity:0.6; }
  .avatar-nav { width:28px; height:28px; border-radius:50%; overflow:hidden; cursor:pointer; border:2px solid var(--border); }
  .avatar-nav img { width:100%; height:100%; object-fit:cover; }
  .icon-wrap { position:relative; display:inline-flex; }
  .notif-dot { position:absolute; top:-2px; right:-2px; width:8px; height:8px; border-radius:50%; background:var(--red); border:2px solid var(--white); }

  /* ── LAYOUT ── */
  .layout {
    max-width:975px; margin:0 auto;
    padding:80px 20px 40px;
  }

  /* ── SEARCH BAR ── */
  .search-section { margin-bottom:28px; }

  .search-wrapper {
    position:relative; max-width:680px; margin:0 auto;
  }
  .search-bar {
    width:100%; display:flex; align-items:center;
    background:var(--white); border:1.5px solid var(--border);
    border-radius:14px; padding:12px 18px; gap:10px;
    box-shadow:var(--card-shadow); transition:border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar:focus-within {
    border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,149,246,0.12);
  }
  .search-bar input {
    flex:1; border:none; outline:none; font-size:15px;
    font-family:'DM Sans',sans-serif; color:var(--text); background:transparent;
  }
  .search-bar input::placeholder { color:var(--muted); }
  .search-clear {
    background:none; border:none; cursor:pointer;
    color:var(--muted); font-size:18px; padding:0 2px;
    display:none;
  }
  .search-clear.show { display:block; }

  /* Search filter tabs */
  .search-filters {
    display:flex; gap:8px; margin-top:12px;
    justify-content:center; flex-wrap:wrap;
  }
  .filter-btn {
    padding:6px 16px; border-radius:20px;
    border:1.5px solid var(--border);
    background:var(--white); font-size:13px;
    font-weight:600; cursor:pointer; transition:all 0.2s;
    font-family:'DM Sans',sans-serif; color:var(--muted);
  }
  .filter-btn.active {
    background:var(--text); color:var(--white); border-color:var(--text);
  }
  .filter-btn:hover:not(.active) { border-color:var(--text); color:var(--text); }

  /* Search dropdown */
  .search-dropdown {
    display:none; position:absolute; top:calc(100% + 8px); left:0; right:0;
    background:var(--white); border:1px solid var(--border);
    border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.12);
    z-index:50; overflow:hidden; max-height:400px; overflow-y:auto;
  }
  .search-dropdown.open { display:block; }
  .dropdown-section-title {
    padding:10px 16px 6px; font-size:12px; font-weight:700;
    color:var(--muted); text-transform:uppercase; letter-spacing:0.5px;
  }
  .dropdown-user {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; cursor:pointer; transition:background 0.15s;
  }
  .dropdown-user:hover { background:var(--bg); }
  .dropdown-avatar { width:44px; height:44px; border-radius:50%; overflow:hidden; background:var(--gradient); padding:2px; flex-shrink:0; }
  .dropdown-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; border:2px solid white; }
  .dropdown-name { font-weight:600; font-size:14px; }
  .dropdown-sub { font-size:12px; color:var(--muted); }
  .dropdown-post {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; cursor:pointer; transition:background 0.15s;
  }
  .dropdown-post:hover { background:var(--bg); }
  .dropdown-post-thumb { width:48px; height:48px; border-radius:8px; object-fit:cover; background:var(--border); flex-shrink:0; }
  .dropdown-empty { padding:20px; text-align:center; color:var(--muted); font-size:13px; }

  /* ── SECTION TITLES ── */
  .section-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .section-title { font-size:16px; font-weight:700; }
  .section-see-all { font-size:13px; font-weight:600; color:var(--blue); cursor:pointer; }
  .section-see-all:hover { text-decoration:underline; }

  /* ── TRENDING TAGS ── */
  .trending-section { margin-bottom:32px; }
  .tags-scroll {
    display:flex; gap:10px; overflow-x:auto; padding-bottom:4px;
    scrollbar-width:none;
  }
  .tags-scroll::-webkit-scrollbar { display:none; }
  .tag-chip {
    display:flex; align-items:center; gap:6px;
    padding:8px 16px; border-radius:20px;
    background:var(--white); border:1.5px solid var(--border);
    cursor:pointer; flex-shrink:0; transition:all 0.2s;
    font-size:13px; font-weight:600; white-space:nowrap;
  }
  .tag-chip:hover { border-color:var(--blue); color:var(--blue); }
  .tag-chip.active { background:var(--text); color:var(--white); border-color:var(--text); }
  .tag-count { font-size:11px; color:var(--muted); font-weight:400; }
  .tag-chip.active .tag-count { color:rgba(255,255,255,0.7); }

  /* ── SUGGESTED PEOPLE ── */
  .people-section { margin-bottom:32px; }
  .people-scroll {
    display:flex; gap:12px; overflow-x:auto; padding-bottom:4px;
    scrollbar-width:none;
  }
  .people-scroll::-webkit-scrollbar { display:none; }

  .person-card {
    width:160px; flex-shrink:0; background:var(--white);
    border:1px solid var(--border); border-radius:16px;
    padding:20px 16px; text-align:center;
    cursor:pointer; transition:all 0.2s;
    box-shadow:var(--card-shadow);
  }
  .person-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.12); }

  .person-avatar-wrap { position:relative; margin:0 auto 10px; width:68px; }
  .person-avatar {
    width:68px; height:68px; border-radius:50%;
    background:var(--gradient); padding:2px; margin:0 auto;
  }
  .person-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; border:2px solid white; }
  .person-name { font-weight:700; font-size:13px; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .person-reason { font-size:11px; color:var(--muted); margin-bottom:12px; }
  .person-stats { display:flex; justify-content:center; gap:12px; margin-bottom:12px; }
  .person-stat { text-align:center; }
  .person-stat strong { display:block; font-size:13px; font-weight:700; }
  .person-stat span { font-size:10px; color:var(--muted); }

  .follow-btn {
    width:100%; padding:7px; border-radius:8px;
    font-size:13px; font-weight:600; cursor:pointer;
    border:none; font-family:'DM Sans',sans-serif;
    transition:all 0.2s;
    background:var(--blue); color:white;
  }
  .follow-btn:hover { background:#1877f2; }
  .follow-btn.following { background:var(--bg); color:var(--text); border:1.5px solid var(--border); }
  .follow-btn.following:hover { background:#ffe0e0; border-color:var(--red); color:var(--red); }

  /* ── POSTS GRID ── */
  .grid-section { margin-bottom:32px; }

  .explore-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:3px;
  }

  /* Instagram-style large featured items */
  .explore-grid .grid-item:nth-child(7n+1) {
    grid-column: span 2;
    grid-row: span 2;
  }

  .grid-item {
    position:relative; overflow:hidden; cursor:pointer;
    background:var(--border); aspect-ratio:1;
  }
  .grid-item img, .grid-item video {
    width:100%; height:100%; object-fit:cover; display:block;
    transition:transform 0.3s;
  }
  .grid-item:hover img, .grid-item:hover video { transform:scale(1.05); }

  .grid-overlay {
    position:absolute; inset:0;
    background:rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center; gap:20px;
    opacity:0; transition:opacity 0.2s;
  }
  .grid-item:hover .grid-overlay { opacity:1; }
  .overlay-stat {
    display:flex; align-items:center; gap:5px;
    color:white; font-size:15px; font-weight:700;
  }
  .overlay-stat svg { width:18px; height:18px; fill:white; }

  .grid-type-badge {
    position:absolute; top:8px; right:8px;
    background:rgba(0,0,0,0.5); border-radius:4px;
    padding:2px 6px; display:flex; align-items:center; gap:3px;
  }
  .grid-type-badge svg { width:12px; height:12px; fill:white; }

  /* ── REELS GRID ── */
  .reels-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:3px;
  }
  .reel-item {
    position:relative; overflow:hidden; cursor:pointer;
    background:#000; aspect-ratio:9/16;
  }
  .reel-item video { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s; }
  .reel-item:hover video { transform:scale(1.03); }
  .reel-overlay-bottom {
    position:absolute; bottom:0; left:0; right:0;
    padding:8px 8px 6px;
    background:linear-gradient(transparent, rgba(0,0,0,0.7));
    color:white;
  }
  .reel-overlay-bottom .reel-user { font-size:11px; font-weight:600; }
  .reel-overlay-bottom .reel-likes { font-size:11px; display:flex; align-items:center; gap:3px; }
  .reel-overlay-bottom .reel-likes svg { width:12px; height:12px; fill:white; }

  /* ── RESULTS ── */
  .results-section { display:none; }
  .results-section.show { display:block; }

  .result-user-row {
    display:flex; align-items:center; gap:14px;
    padding:12px 0; border-bottom:1px solid var(--border); cursor:pointer;
  }
  .result-user-row:last-child { border-bottom:none; }
  .result-avatar { width:52px; height:52px; border-radius:50%; overflow:hidden; background:var(--gradient); padding:2px; flex-shrink:0; }
  .result-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; border:2px solid white; }
  .result-info { flex:1; }
  .result-name { font-weight:700; font-size:14px; }
  .result-sub { font-size:12px; color:var(--muted); }
  .result-follow-btn {
    padding:7px 18px; border-radius:8px;
    font-size:13px; font-weight:600; cursor:pointer;
    border:none; font-family:'DM Sans',sans-serif;
    background:var(--blue); color:white; transition:all 0.2s;
  }
  .result-follow-btn:hover { background:#1877f2; }
  .result-follow-btn.following { background:var(--bg); color:var(--text); border:1.5px solid var(--border); }

  /* ── SPINNER ── */
  .spinner { text-align:center; padding:40px; color:var(--muted); }
  .spinner::after { content:''; display:inline-block; width:26px; height:26px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--blue); animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }

  /* ── EMPTY ── */
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state .icon { font-size:48px; margin-bottom:12px; }
  .empty-state h3 { font-size:18px; font-weight:600; color:var(--text); margin-bottom:6px; }

  /* ── POST MODAL ── */
  .post-modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.8); z-index:200;
    align-items:center; justify-content:center; padding:20px;
  }
  .post-modal-overlay.open { display:flex; }
  .post-modal {
    background:var(--white); border-radius:12px;
    max-width:900px; width:100%; max-height:90vh;
    display:flex; overflow:hidden; animation:modalIn 0.2s ease;
  }
  @keyframes modalIn { from{transform:scale(0.94);opacity:0;} to{transform:scale(1);opacity:1;} }
  .post-modal-img { flex:1; background:#000; display:flex; align-items:center; justify-content:center; min-height:300px; }
  .post-modal-img img { max-width:100%; max-height:80vh; object-fit:contain; }
  .post-modal-side { width:340px; flex-shrink:0; display:flex; flex-direction:column; border-left:1px solid var(--border); }
  .post-modal-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .post-modal-avatar { width:36px; height:36px; border-radius:50%; overflow:hidden; background:var(--gradient); padding:2px; }
  .post-modal-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; border:2px solid white; }
  .post-modal-username { font-weight:700; font-size:14px; }
  .post-modal-close { margin-left:auto; background:none; border:none; cursor:pointer; font-size:22px; color:var(--muted); }
  .post-modal-caption { padding:14px 16px; flex:1; overflow-y:auto; font-size:14px; line-height:1.6; }
  .post-modal-actions { padding:12px 16px; border-top:1px solid var(--border); }
  .post-modal-likes { font-weight:700; margin-bottom:4px; }
  .post-modal-time { font-size:11px; color:var(--muted); text-transform:uppercase; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:#333; color:white; padding:10px 22px; border-radius:20px; font-size:13px; font-weight:500; z-index:999; transition:transform 0.3s; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* ── MOBILE ── */
  @media(max-width:768px) {
    .explore-grid, .reels-grid { grid-template-columns:repeat(3,1fr); }
    .explore-grid .grid-item:nth-child(7n+1) { grid-column:span 2; grid-row:span 2; }
    .people-scroll { padding:0 0 8px; }
    .post-modal { flex-direction:column; }
    .post-modal-side { width:100%; border-left:none; border-top:1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo" onclick="window.location.href='/'">Lumigram</div>
  <div class="nav-icons">
    <svg onclick="window.location.href='/'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <svg onclick="window.location.href='/messenger/'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <div class="icon-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <div class="notif-dot"></div>
    </div>
    <div class="avatar-nav" onclick="window.location.href='/api/accounts/profile-page/'">
      <img id="nav-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=zain" alt="">
    </div>
  </div>
</nav>

<div class="layout">

  <!-- SEARCH -->
  <div class="search-section">
    <div class="search-wrapper">
      <div class="search-bar">
        <svg width="18" height="18" fill="none" stroke="#8e8e8e" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search people, posts, reels…"
          oninput="onSearchInput(this.value)"
          onfocus="openDropdown()"
          onblur="setTimeout(closeDropdown,200)">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>

      <!-- Dropdown -->
      <div class="search-dropdown" id="search-dropdown">
        <div id="dropdown-content">
          <div class="dropdown-empty">Start typing to search…</div>
        </div>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="search-filters">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="filter-people" onclick="setFilter('people')">👤 People</button>
      <button class="filter-btn" id="filter-posts" onclick="setFilter('posts')">📷 Posts</button>
      <button class="filter-btn" id="filter-reels" onclick="setFilter('reels')">🎬 Reels</button>
    </div>
  </div>

  <!-- SEARCH RESULTS (shown when searching) -->
  <div class="results-section" id="results-section">
    <div id="results-content"><div class="spinner"></div></div>
  </div>

  <!-- EXPLORE CONTENT (shown when not searching) -->
  <div id="explore-content">

    <!-- TRENDING TAGS -->
    <div class="trending-section">
      <div class="section-header">
        <div class="section-title">🔥 Trending</div>
      </div>
      <div class="tags-scroll" id="tags-row">
        <!-- loaded dynamically -->
        <div class="tag-chip active" onclick="filterByTag(this, '')">✨ All</div>
        <div class="tag-chip" onclick="filterByTag(this, 'photography')">#photography <span class="tag-count">2.1M</span></div>
        <div class="tag-chip" onclick="filterByTag(this, 'travel')">#travel <span class="tag-count">1.8M</span></div>
        <div class="tag-chip" onclick="filterByTag(this, 'food')">#food <span class="tag-count">1.5M</span></div>
        <div class="tag-chip" onclick="filterByTag(this, 'nature')">#nature <span class="tag-count">1.2M</span></div>
        <div class="tag-chip" onclick="filterByTag(this, 'fashion')">#fashion <span class="tag-count">980K</span></div>
        <div class="tag-chip" onclick="filterByTag(this, 'art')">#art <span class="tag-count">870K</span></div>
        <div class="tag-chip" onclick="filterByTag(this, 'fitness')">#fitness <span class="tag-count">750K</span></div>
        <div class="tag-chip" onclick="filterByTag(this, 'music')">#music <span class="tag-count">620K</span></div>
        <div class="tag-chip" onclick="filterByTag(this, 'tech')">#tech <span class="tag-count">540K</span></div>
      </div>
    </div>

    <!-- SUGGESTED PEOPLE -->
    <div class="people-section">
      <div class="section-header">
        <div class="section-title">👥 Suggested for you</div>
        <div class="section-see-all" onclick="setFilter('people');doSearch('a')">See all</div>
      </div>
      <div class="people-scroll" id="people-scroll">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- TRENDING POSTS GRID -->
    <div class="grid-section">
      <div class="section-header">
        <div class="section-title">📷 Posts</div>
        <div class="section-see-all" onclick="setFilter('posts');doSearch('')">See all</div>
      </div>
      <div class="explore-grid" id="posts-grid">
        <div class="spinner" style="grid-column:1/-1"></div>
      </div>
    </div>

    <!-- REELS GRID -->
    <div class="grid-section">
      <div class="section-header">
        <div class="section-title">🎬 Reels</div>
        <div class="section-see-all" onclick="setFilter('reels');doSearch('')">See all</div>
      </div>
      <div class="reels-grid" id="reels-grid">
        <div class="spinner" style="grid-column:1/-1"></div>
      </div>
    </div>

  </div><!-- end explore-content -->
</div><!-- end layout -->

<!-- POST MODAL -->
<div class="post-modal-overlay" id="post-modal" onclick="closePostModal(event)">
  <div class="post-modal" onclick="event.stopPropagation()">
    <div class="post-modal-img" id="modal-img-wrap">
      <img id="modal-img" src="" alt="">
    </div>
    <div class="post-modal-side">
      <div class="post-modal-header">
        <div class="post-modal-avatar"><img id="modal-avatar" src="" alt=""></div>
        <div class="post-modal-username" id="modal-username"></div>
        <button class="post-modal-close" onclick="document.getElementById('post-modal').classList.remove('open')">×</button>
      </div>
      <div class="post-modal-caption" id="modal-caption"></div>
      <div class="post-modal-actions">
        <div class="post-modal-likes" id="modal-likes"></div>
        <div class="post-modal-time" id="modal-time"></div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── STATE ─────────────────────────────────────────────────
  let currentUser = null;
  let currentFilter = 'all';
  let allPosts = [];
  let allReels = [];
  let searchDebounce = null;
  let isSearching = false;

  // ── CSRF ──────────────────────────────────────────────────
  function getCookie(name) {
    for (let c of document.cookie.split(';')) {
      const [k,v] = c.trim().split('=');
      if (k === name) return decodeURIComponent(v);
    }
    return null;
  }

  // ── TOAST ─────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── HELPERS ───────────────────────────────────────────────
  function getAvatar(author) {
    if (author && author.profile && author.profile.photo) return author.profile.photo;
    return 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + (author ? author.username : 'user');
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatTime(dt) {
    const d = new Date(dt);
    const diff = (Date.now() - d) / 1000;
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return d.toLocaleDateString([],{month:'short',day:'numeric'});
  }

  function formatCount(n) {
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return n;
  }

  // ── INIT ──────────────────────────────────────────────────
  async function init() {
    try {
      await fetch('/api/accounts/login/', {
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':getCookie('csrftoken')},
        credentials:'include',
        body:JSON.stringify({username:'zain',password:'Zain@1234567'})
      });
    } catch(e) {}

    try {
      const r = await fetch('/api/accounts/profile/zain/', {credentials:'include'});
      currentUser = await r.json();
      const photo = currentUser.profile && currentUser.profile.photo ? currentUser.profile.photo : null;
      if (photo) document.getElementById('nav-avatar').src = photo;
    } catch(e) {}

    loadPosts();
    loadReels();
    loadSuggestedPeople();
  }

  // ── LOAD POSTS ────────────────────────────────────────────
  async function loadPosts() {
    const grid = document.getElementById('posts-grid');
    try {
      const r = await fetch('/api/posts/all/', {credentials:'include'});
      allPosts = await r.json();
      renderPostsGrid(allPosts);
    } catch(e) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📷</div><h3>No posts yet</h3></div>';
    }
  }

  function renderPostsGrid(posts) {
    const grid = document.getElementById('posts-grid');
    if (!posts.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📷</div><h3>No posts found</h3></div>';
      return;
    }
    grid.innerHTML = posts.map((post, i) => {
      const avatar = getAvatar(post.author);
      return '<div class="grid-item" onclick="openPost(' + JSON.stringify(post).replace(/"/g,'&quot;') + ')">'
        + '<img src="' + post.image + '" alt="" loading="lazy">'
        + '<div class="grid-overlay">'
        + '<div class="overlay-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' + formatCount(post.like_count) + '</div>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  // ── LOAD REELS ────────────────────────────────────────────
  async function loadReels() {
    const grid = document.getElementById('reels-grid');
    try {
      const r = await fetch('/api/reels/', {credentials:'include'});
      allReels = await r.json();
      renderReelsGrid(allReels);
    } catch(e) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎬</div><h3>No reels yet</h3></div>';
    }
  }

  function renderReelsGrid(reels) {
    const grid = document.getElementById('reels-grid');
    if (!reels.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎬</div><h3>No reels found</h3></div>';
      return;
    }
    grid.innerHTML = reels.map(reel =>
      '<div class="reel-item" onclick="window.location.href=\'/\'">'
      + '<video src="' + reel.video + '" muted loop preload="none"></video>'
      + '<div class="reel-overlay-bottom">'
      + '<div class="reel-user">@' + escHtml(reel.author.username) + '</div>'
      + '<div class="reel-likes"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' + formatCount(reel.like_count) + '</div>'
      + '</div>'
      + '</div>'
    ).join('');

    // lazy play on scroll
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        const vid = e.target.querySelector('video');
        if (vid) { if (e.isIntersecting) vid.play(); else vid.pause(); }
      });
    }, {threshold:0.5});
    grid.querySelectorAll('.reel-item').forEach(el => observer.observe(el));
  }

  // ── SUGGESTED PEOPLE ──────────────────────────────────────
  async function loadSuggestedPeople() {
    const scroll = document.getElementById('people-scroll');
    try {
      const r = await fetch('/api/accounts/search/?q=a', {credentials:'include'});
      const users = await r.json();
      if (!users.length) {
        scroll.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px;">No suggestions yet</div>';
        return;
      }
      // filter out self
      const filtered = users.filter(u => !currentUser || u.username !== currentUser.username).slice(0,10);
      scroll.innerHTML = filtered.map(u => {
        const photo = getAvatar(u);
        const fullName = [u.first_name, u.last_name].filter(Boolean).join(' ') || u.username;
        return '<div class="person-card">'
          + '<div class="person-avatar-wrap"><div class="person-avatar"><img src="' + photo + '" alt=""></div></div>'
          + '<div class="person-name">' + escHtml(u.username) + '</div>'
          + '<div class="person-reason">' + escHtml(fullName) + '</div>'
          + '<button class="follow-btn" onclick="toggleFollow(this,\'' + u.username + '\',event)">Follow</button>'
          + '</div>';
      }).join('');
    } catch(e) {
      scroll.innerHTML = '<div style="padding:20px;color:var(--muted)">Could not load suggestions</div>';
    }
  }

  // ── FOLLOW ────────────────────────────────────────────────
  async function toggleFollow(btn, username, e) {
    if (e) e.stopPropagation();
    if (btn.classList.contains('following')) {
      btn.classList.remove('following');
      btn.textContent = 'Follow';
      showToast('Unfollowed @' + username);
    } else {
      try {
        await fetch('/api/accounts/follow/' + username + '/', {
          method:'POST',
          headers:{'X-CSRFToken':getCookie('csrftoken')},
          credentials:'include'
        });
      } catch(e) {}
      btn.classList.add('following');
      btn.textContent = 'Following ✓';
      showToast('Following @' + username + ' ✅');
    }
  }

  // ── TAG FILTER ────────────────────────────────────────────
  function filterByTag(el, tag) {
    document.querySelectorAll('.tag-chip').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (!tag) {
      renderPostsGrid(allPosts);
      renderReelsGrid(allReels);
      return;
    }
    const filteredPosts = allPosts.filter(p =>
      p.caption && p.caption.toLowerCase().includes(tag.toLowerCase())
    );
    const filteredReels = allReels.filter(r =>
      r.caption && r.caption.toLowerCase().includes(tag.toLowerCase())
    );
    renderPostsGrid(filteredPosts);
    renderReelsGrid(filteredReels);
  }

  // ── SEARCH ────────────────────────────────────────────────
  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter-' + filter).classList.add('active');
    const q = document.getElementById('search-input').value.trim();
    if (q) doSearch(q);
  }

  function onSearchInput(val) {
    const clearBtn = document.getElementById('search-clear');
    clearBtn.classList.toggle('show', val.length > 0);

    clearTimeout(searchDebounce);
    if (!val.trim()) {
      showExplore();
      closeDropdown();
      return;
    }
    openDropdown();
    searchDebounce = setTimeout(() => {
      doSearch(val);
      updateDropdown(val);
    }, 350);
  }

  function showExplore() {
    document.getElementById('explore-content').style.display = 'block';
    document.getElementById('results-section').classList.remove('show');
    isSearching = false;
  }

  async function doSearch(q) {
    isSearching = true;
    document.getElementById('explore-content').style.display = 'none';
    const results = document.getElementById('results-section');
    const content = document.getElementById('results-content');
    results.classList.add('show');
    content.innerHTML = '<div class="spinner"></div>';

    try {
      let html = '';

      // People
      if (currentFilter === 'all' || currentFilter === 'people') {
        const ur = await fetch('/api/accounts/search/?q=' + encodeURIComponent(q), {credentials:'include'});
        const users = await ur.json();
        if (users.length) {
          html += '<div class="section-header" style="margin-top:8px"><div class="section-title">👤 People</div></div>';
          html += users.map(u => {
            const photo = getAvatar(u);
            const fullName = [u.first_name, u.last_name].filter(Boolean).join(' ') || '';
            return '<div class="result-user-row" onclick="window.location.href=\'/api/accounts/profile-page/\'">'
              + '<div class="result-avatar"><img src="' + photo + '" alt=""></div>'
              + '<div class="result-info"><div class="result-name">' + escHtml(u.username) + '</div>'
              + '<div class="result-sub">' + escHtml(fullName) + '</div></div>'
              + '<button class="result-follow-btn" onclick="toggleFollow(this,\'' + u.username + '\',event)">Follow</button>'
              + '</div>';
          }).join('');
        }
      }

      // Posts
      if (currentFilter === 'all' || currentFilter === 'posts') {
        const matchedPosts = allPosts.filter(p =>
          (p.caption && p.caption.toLowerCase().includes(q.toLowerCase())) ||
          (p.author && p.author.username.toLowerCase().includes(q.toLowerCase()))
        );
        if (matchedPosts.length) {
          html += '<div class="section-header" style="margin-top:20px"><div class="section-title">📷 Posts</div></div>';
          html += '<div class="explore-grid" style="margin-bottom:24px">'
            + matchedPosts.map(post =>
              '<div class="grid-item" onclick="openPost(' + JSON.stringify(post).replace(/"/g,'&quot;') + ')">'
              + '<img src="' + post.image + '" alt="" loading="lazy">'
              + '<div class="grid-overlay">'
              + '<div class="overlay-stat"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:white"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' + formatCount(post.like_count) + '</div>'
              + '</div></div>'
            ).join('')
            + '</div>';
        }
      }

      // Reels
      if (currentFilter === 'all' || currentFilter === 'reels') {
        const matchedReels = allReels.filter(r =>
          (r.caption && r.caption.toLowerCase().includes(q.toLowerCase())) ||
          (r.author && r.author.username.toLowerCase().includes(q.toLowerCase()))
        );
        if (matchedReels.length) {
          html += '<div class="section-header" style="margin-top:20px"><div class="section-title">🎬 Reels</div></div>';
          html += '<div class="reels-grid" style="margin-bottom:24px">'
            + matchedReels.map(reel =>
              '<div class="reel-item">'
              + '<video src="' + reel.video + '" muted loop preload="none"></video>'
              + '<div class="reel-overlay-bottom">'
              + '<div class="reel-user">@' + escHtml(reel.author.username) + '</div>'
              + '<div class="reel-likes"><svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:white"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' + formatCount(reel.like_count) + '</div>'
              + '</div></div>'
            ).join('')
            + '</div>';
        }
      }

      if (!html) {
        html = '<div class="empty-state"><div class="icon">🔍</div><h3>No results for "' + escHtml(q) + '"</h3><p>Try a different search term</p></div>';
      }

      content.innerHTML = html;

    } catch(err) {
      content.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Search error</h3><p>Please try again</p></div>';
    }
  }

  // ── SEARCH DROPDOWN ───────────────────────────────────────
  async function updateDropdown(q) {
    const dc = document.getElementById('dropdown-content');
    dc.innerHTML = '<div class="spinner" style="padding:16px"></div>';
    try {
      const r = await fetch('/api/accounts/search/?q=' + encodeURIComponent(q), {credentials:'include'});
      const users = await r.json();
      let html = '';
      if (users.length) {
        html += '<div class="dropdown-section-title">People</div>';
        html += users.slice(0,5).map(u => {
          const photo = getAvatar(u);
          return '<div class="dropdown-user" onclick="window.location.href=\'/api/accounts/profile-page/\'">'
            + '<div class="dropdown-avatar"><img src="' + photo + '" alt=""></div>'
            + '<div><div class="dropdown-name">' + escHtml(u.username) + '</div>'
            + '<div class="dropdown-sub">' + escHtml([u.first_name,u.last_name].filter(Boolean).join(' ')) + '</div></div>'
            + '</div>';
        }).join('');
      }
      const matchedPosts = allPosts.filter(p =>
        p.caption && p.caption.toLowerCase().includes(q.toLowerCase())
      ).slice(0,3);
      if (matchedPosts.length) {
        html += '<div class="dropdown-section-title">Posts</div>';
        html += matchedPosts.map(p =>
          '<div class="dropdown-post" onclick="openPost(' + JSON.stringify(p).replace(/"/g,'&quot;') + ')">'
          + '<img class="dropdown-post-thumb" src="' + p.image + '" alt="">'
          + '<div><div class="dropdown-name">@' + escHtml(p.author.username) + '</div>'
          + '<div class="dropdown-sub">' + escHtml(p.caption.substring(0,40)) + '</div></div>'
          + '</div>'
        ).join('');
      }
      if (!html) html = '<div class="dropdown-empty">No results for "' + escHtml(q) + '"</div>';
      dc.innerHTML = html;
    } catch(e) {
      dc.innerHTML = '<div class="dropdown-empty">Search error</div>';
    }
  }

  function openDropdown() { document.getElementById('search-dropdown').classList.add('open'); }
  function closeDropdown() { document.getElementById('search-dropdown').classList.remove('open'); }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('show');
    showExplore();
    closeDropdown();
  }

  // ── POST MODAL ────────────────────────────────────────────
  function openPost(post) {
    document.getElementById('modal-img').src = post.image;
    document.getElementById('modal-avatar').src = getAvatar(post.author);
    document.getElementById('modal-username').textContent = post.author.username;
    document.getElementById('modal-caption').textContent = post.caption || '';
    document.getElementById('modal-likes').textContent = formatCount(post.like_count) + ' likes';
    document.getElementById('modal-time').textContent = formatTime(post.created_at);
    document.getElementById('post-modal').classList.add('open');
  }

  function closePostModal(e) {
    if (e.target === document.getElementById('post-modal'))
      document.getElementById('post-modal').classList.remove('open');
  }

  init();
</script>
</body>
</html>
